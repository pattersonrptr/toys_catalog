services:

  # ─── Banco de Dados ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: shopfy_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopfy
      POSTGRES_USER: shopfy
      POSTGRES_PASSWORD: shopfy          # mude em produção via .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopfy -d shopfy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Aplicação Spring Boot ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: shopfy_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: shopfy
      DB_USER: shopfy
      DB_PASSWORD: shopfy
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:   # dados do banco persistem entre restarts
  uploads:         # imagens de produtos
