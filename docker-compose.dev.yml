# docker-compose para desenvolvimento local
# Só o banco e MinIO — a app roda na IDE com hot reload
services:

  db:
    image: postgres:16-alpine
    container_name: shopfy_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopfy
      POSTGRES_USER: shopfy
      POSTGRES_PASSWORD: shopfy
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopfy -d shopfy"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MinIO (object storage S3-compatible) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: shopfy_minio_dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: shopfy_minio_setup_dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/shopfy-images &&
        mc anonymous set download local/shopfy-images &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

volumes:
  postgres_dev_data:
  minio_dev_data:
