services:

  # ─── Banco de Dados ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: shopfy_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopfy
      POSTGRES_USER: shopfy
      POSTGRES_PASSWORD: shopfy          # mude em produção via .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopfy -d shopfy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Aplicação Spring Boot ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: shopfy_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: shopfy
      DB_USER: shopfy
      DB_PASSWORD: shopfy
      SERVER_PORT: 8080
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: shopfy-images
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
    ports:
      - "8080:8080"

  # ─── MinIO (object storage S3-compatible) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: shopfy_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO setup: cria bucket e define política pública ───────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: shopfy_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/shopfy-images &&
        mc anonymous set download local/shopfy-images &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

volumes:
  postgres_data:   # dados do banco persistem entre restarts
  minio_data:      # objetos do MinIO
