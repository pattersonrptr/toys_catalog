services:

  # ─── Banco de Dados ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: toys_catalog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: toys_catalog
      POSTGRES_USER: toys
      POSTGRES_PASSWORD: toys          # mude em produção via .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toys -d toys_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Aplicação Spring Boot ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: toys_catalog_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: toys_catalog
      DB_USER: toys
      DB_PASSWORD: toys
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:   # dados do banco persistem entre restarts
  uploads:         # imagens de produtos
