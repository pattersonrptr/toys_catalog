spring:
  datasource:
    url: jdbc:h2:mem:shopfy_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: none          # Flyway owns the schema
  flyway:
    enabled: true
    locations: classpath:db/migration

shopfy:
  jwt:
    secret: 1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b
    expiration-ms: 86400000
