# docker-compose para desenvolvimento local
# Só o banco — a app roda na IDE com hot reload
services:

  db:
    image: postgres:16-alpine
    container_name: shopfy_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopfy
      POSTGRES_USER: shopfy
      POSTGRES_PASSWORD: shopfy
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopfy -d shopfy"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
